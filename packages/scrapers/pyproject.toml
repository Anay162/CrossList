[project]
name = "crosslist-scrapers"
version = "0.1.0"
description = "Catalog scrapers and ingest pipeline for CrossList"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "asyncpg>=0.30,<1.0",
  "httpx>=0.28,<1.0",
  "pydantic>=2.9,<3.0",
  "selectolax>=0.3.26,<1.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["crosslist_scrapers"]

[tool.uv]
package = true
